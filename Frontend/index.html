<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Primary Meta / SEO - India's AI Student Portal, MentorsDaily -->
    <title>MentorsDaily – India&apos;s AI Student Portal | UPSC Preparation</title>
    <meta name="description" content="MentorsDaily is an AI-powered student portal dashboard for UPSC preparation. One dashboard for answer writing, tests, analytics and mentor support. Built for serious aspirants." />
    <meta name="keywords" content="student portal, student portal dashboard, AI powered dashboard, UPSC preparation, UPSC CSE, answer writing, UPSC mains, current affairs, UPSC mentor, MentorsDaily, civil services exam, AI mentor" />
    <meta name="author" content="MentorsDaily" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="http://studentportal.mentorsdaily.com/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MentorsDaily – India&apos;s AI Student Portal" />
    <meta property="og:description" content="Your AI-powered student portal for UPSC preparation. One dashboard for answer writing, tests, analytics and 24/7 mentor support." />
    <meta property="og:image" content="http://studentportal.mentorsdaily.com/favicon.png" />
    <meta property="og:url" content="http://studentportal.mentorsdaily.com/" />
    <meta property="og:site_name" content="MentorsDaily" />
    <meta property="og:locale" content="en_IN" />

    <!-- JSON-LD: WebSite for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MentorsDaily",
        "url": "http://studentportal.mentorsdaily.com/",
        "description": "AI-powered student portal dashboard for UPSC preparation. One dashboard for answer writing, tests, analytics and mentor support.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "http://studentportal.mentorsdaily.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MentorsDaily – India&apos;s AI Student Portal" />
    <meta name="twitter:description" content="AI-powered student portal for UPSC preparation. One dashboard for answer writing, tests and mentor support." />
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
